<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duo Dynamics | Car & Motor Wash</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <style>

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.navbar-brand{
font-weight:bold;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("hero.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero-logo{
width:180px;
margin-bottom:20px;
}

.hero h1{
font-size:4rem;
font-weight:700;
}

.hero p{
font-size:1.2rem;
margin-bottom:25px;
}

/* SECTION */

section{
padding:100px 0;
}

.section-title{
text-align:center;
margin-bottom:50px;
font-weight:700;
}

.card-custom{
background:white;
border:none;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
height:100%;
}

.card-custom img{
width:100%;
height:250px;
object-fit:cover;
}

.contact-box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* ANIMATION */

.fade-up{
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}

.fade-up.show{
opacity:1;
transform:translateY(0);
<!-- ================= NAVBAR ================= -->
<header class="navbar">
  <div class="logo">
    <h2>Duo Dynamics</h2>
  </div>

  <nav>
    <a href="#home">Home</a>
    <a href="#services">Layanan</a>
    <a href="#price">Harga</a>
    <a href="#contact">Kontak</a>
  </nav>

  <a class="btn-primary" href="#price">Booking</a>
</header>


<!-- ================= HERO ================= -->
<section class="hero" id="home">

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Duo Dynamics</h1>

    <p class="tagline">
      Premium Wash & Detailing Service
    </p>

    <p class="desc">
      Bersih maksimal, kilap optimal, dengan sentuhan profesional modern.
    </p>

    <div class="hero-btn">
      <a href="#services" class="btn-glow">Lihat Layanan</a>
      <a href="#price" class="btn-outline">Cek Harga</a>
    </div>
  </div>

</section>


<!-- ================= SERVICES ================= -->
<section class="services" id="services">

  <h2>Layanan Kami</h2>

  <div class="card-container">

    <div class="card glass">
      <i class="fa-solid fa-motorcycle"></i>
      <h3>Cuci Motor</h3>
      <p>Steam + pembersihan detail motor.</p>
    </div>

    <div class="card glass">
      <i class="fa-solid fa-car"></i>
      <h3>Cuci Mobil</h3>
      <p>Exterior wash & interior basic cleaning.</p>
    </div>

    <div class="card glass">
      <i class="fa-solid fa-sparkles"></i>
      <h3>Detailing</h3>
      <p>Polish, wax, dan perawatan premium.</p>
    </div>

  </div>

</section>


<!-- ================= PRICE ================= -->
<section class="price" id="price">

  <h2>Daftar Harga</h2>

  <div class="price-container">

    <div class="price-card glass">
      <h3>Cuci Motor</h3>
      <p class="price-tag">Rp 25.000</p>
      <span>Estimasi 15–25 menit</span>
    </div>

    <div class="price-card glass">
      <h3>Cuci Mobil</h3>
      <p class="price-tag">Rp 35.000</p>
      <span>Estimasi 25–40 menit</span>
    </div>

  </div>

</section>


<!-- ================= ABOUT ================= -->
<section class="about">

  <div class="glass about-box">
    <h2>Tentang Duo Dynamics</h2>
    <p>
      Kami menghadirkan layanan cuci kendaraan modern dengan standar premium,
      menggabungkan kecepatan, ketelitian, dan hasil akhir yang mengkilap seperti baru.
    </p>
  </div>

</section>


<!-- ================= CONTACT ================= -->
<section class="contact" id="contact">

  <h2>Hubungi Kami</h2>

  <div class="glass contact-box">
    <p><i class="fa-solid fa-location-dot"></i> Pangkalan Bun</p>
    <p><i class="fa-solid fa-clock"></i> 08.00 - 20.00</p>
    <p><i class="fa-solid fa-phone"></i> 085943124767</p>

    <a class="btn-glow whatsapp"
       href="https://wa.me/628085943124767">
       Chat WhatsApp
    </a>
  </div>
</p>

<hr>
</div>

<div class="col-lg-6">

<div class="contact-box">

<h4>Find Us On Map</h4>

<iframe
src="https://www.google.com/maps?q=Jl+Edy+Suwargono+Pangkalan+Bun&output=embed"
width="100%"
height="320"
style="border:0;border-radius:15px;"
loading="lazy">
</iframe>

    </p>
  </div>
</section>


<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 Duo Dynamics • Premium Car & Motor Wash</p>
</footer>

</body>
</html>
